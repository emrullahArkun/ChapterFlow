spring.jpa.hibernate.ddl-auto=validate

# DB — injected via environment variables
# For Neon, use: jdbc:postgresql://ep-xxx.region.aws.neon.tech/readwick?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}

# Logging — no sensitive info in prod
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# CORS — set your real domain
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://readwick.example.com}

# Swagger disabled in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Don't expose stack traces
server.error.include-stacktrace=never

# Trust proxy headers (X-Forwarded-Proto, X-Forwarded-For) from Nginx
server.forward-headers-strategy=native
